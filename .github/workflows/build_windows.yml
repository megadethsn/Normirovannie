name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter==5.2.1
        pip install python-docx docx2pdf
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Windows 10+ compatible)
      run: |
        # Собираем с явным указанием совместимости
        pyinstaller --onefile --windowed ^
                   --add-data "templates/*;templates" ^
                   --hidden-import customtkinter ^
                   --hidden-import docx ^
                   --hidden-import docx2pdf ^
                   --target-arch win10 ^
                   main.py

        # Копируем templates
        if not exist "dist\templates" mkdir dist\templates
        xcopy /s /y templates\* dist\templates\

    - name: Verify build
      run: |
        dir dist
        if not exist "dist\templates" exit 1

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NormZadanie-Windows
        path: |
          dist/main.exe
          dist/templates/
