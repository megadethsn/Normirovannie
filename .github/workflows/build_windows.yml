name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter==5.2.1
        pip install python-docx docx2pdf
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create .spec file
      run: |
        pyi-makespec --onefile --windowed --add-data "templates/*;templates" main.py
        
        $specContent = Get-Content -Path main.spec -Raw
        $specContent = $specContent -replace 'hiddenimports=\[\]', 'hiddenimports=["customtkinter", "docx", "docx.shared", "docx.text", "docx2pdf"]'
        $specContent = $specContent -replace 'datas=\[\]', 'datas=[("templates/*", "templates")]'
        Set-Content -Path main.spec -Value $specContent

    - name: Build with PyInstaller
      run: |
        pyinstaller main.spec
        
        # Копируем templates с принудительной перезаписью
        if (!(Test-Path -Path "dist\templates")) {
            New-Item -ItemType Directory -Path "dist\templates" | Out-Null
        }
        Copy-Item -Path "templates\*" -Destination "dist\templates" -Recurse -Force

    - name: Verify build
      run: |
        # Проверка файлов
        Write-Output "=== Содержимое dist ==="
        Get-ChildItem -Recurse -Path dist
        
        # Проверка наличия templates
        if (!(Test-Path -Path "dist\templates")) {
            Write-Error "Папка templates не найдена в dist!"
            exit 1
        }

        

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NormZadanie-Windows
        path: |
          dist/main.exe
          dist/templates/
