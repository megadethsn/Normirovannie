name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4 
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter python-docx comtypes
        
    - name: Prepare templates
      run: |
        mkdir dist\templates
        copy templates\* dist\templates\
        
    - name: Build application
      run: |
        pyinstaller --onefile --windowed --name GeneratorNormirovannoe --add-data "templates/*;templates" main.py
        
    - name: Verify build
      run: |
        dir dist\
        dir dist\templates\
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GeneratorNormirovannoe
        path: |
          dist/GeneratorNormirovannoe.exe
          dist/templates/
