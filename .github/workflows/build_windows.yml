name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter python-docx comtypes==1.1.14
        
    - name: Build application
      run: |
        pyinstaller --onefile --windowed --name NormZadanie --add-data "templates/*;templates" main.py
        
    - name: Verify build
      run: |
        echo "Проверка собранного приложения:"
        dir "dist"
        echo "Проверка папки templates:"
        dir "dist\templates"
        
    - name: Upload complete dist folder
      uses: actions/upload-artifact@v4
      with:
        name: NormZadanie-Complete
        path: dist/
