name: Build Windows App

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter python-docx docx2pdf
        
    - name: Build application
      run: |
        pyinstaller --onefile --windowed --name NormZadanie --add-data "templates;templates" main.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v2
      with:
        name: NormZadanie
        path: dist/NormZadanie.exe
