name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter python-docx comtypes==1.1.14
        
    - name: Build application
      run: |
        pyinstaller --onefile --windowed --name NormZadanie --add-data "templates/*;templates" main.py
        
    - name: Verify build
      run: |
        echo "Содержимое dist:"
        dir dist\
        echo "Содержимое dist/templates:"
        dir dist\templates\
        
    - name: Create distribution package
      run: |
        # Создаем папку для финального пакета
        mkdir NormZadanie_Package
        # Копируем exe файл
        copy dist\NormZadanie.exe NormZadanie_Package\
        # Копируем папку templates
        xcopy templates NormZadanie_Package\templates /E /I
        echo "Содержимое пакета:"
        dir NormZadanie_Package /S
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Генератор нормированных заданий
        path: |
          NormZadanie_Package/NormZadanie.exe
          NormZadanie_Package/templates/
