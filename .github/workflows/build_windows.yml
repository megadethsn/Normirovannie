name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.13.2"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter==5.2.1
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create .spec file
      run: |
        # Генерируем spec-файл с явным указанием данных
        pyi-makespec --onefile --windowed --add-data "templates/*;templates" main.py
        
        # Модифицируем spec-файл
        $specContent = Get-Content -Path main.spec -Raw
        $specContent = $specContent -replace 'hiddenimports=\[\]', 'hiddenimports=["customtkinter"]'
        $specContent = $specContent -replace 'datas=\[\]', 'datas=[("templates/*", "templates")]'
        Set-Content -Path main.spec -Value $specContent

    - name: Build with PyInstaller
      run: |
        pyinstaller main.spec
        
        # Вручную копируем templates, если нужно
        if (!(Test-Path -Path "dist\templates")) {
            New-Item -ItemType Directory -Path "dist\templates"
            Copy-Item -Path "templates\*" -Destination "dist\templates"
        }

    - name: Verify build
      run: |
        # Проверяем наличие файлов
        Get-ChildItem -Recurse -Path dist
        if (!(Test-Path -Path "dist\templates")) {
            Write-Error "Папка templates не найдена в dist!"
            exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NormZadanie-Windows
        path: |
          dist/main.exe
          dist/templates/
